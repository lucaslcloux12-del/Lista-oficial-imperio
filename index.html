<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assobiadores Mundiais</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f30;
            --accent-color: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #243249;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        .title-group {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
            word-wrap: break-word;
        }

        /* Bot√£o Configura√І√µes */
        .btn-config {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            z-index: 10;
        }

        .btn-config:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
        }

        /* Container de Patentes na Tela Principal */
        .container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .category-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .category-title {
            font-size: 1.3rem;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .patent-item {
            margin-bottom: 12px;
            padding: 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.02);
        }

        .patent-name {
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-main);
            display: block;
            margin-bottom: 4px;
        }

        .members-list {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            padding-left: 5px;
            min-height: 18px;
        }

        /* Modal / Painel de Login e Edi√І√£o */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: var(--text-muted);
            font-size: 1.5rem; cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            border: none; border-radius: 6px;
            color: #000; font-weight: bold; cursor: pointer;
        }

        /* √Бrea de Edi√І√£o em Formato de Lista */
        #edit-panel {
            display: none;
        }

        .edit-row {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .edit-row label {
            font-size: 0.9rem;
            color: var(--accent-color);
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .member-list-edit {
            list-style: none;
            margin-bottom: 8px;
        }

        .member-item-edit {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .member-item-edit span {
            flex-grow: 1;
            background: rgba(0,0,0,0.2);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-delete-member {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: var(--danger-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-delete-member:hover {
            background: var(--danger-color);
            color: #fff;
        }

        .add-member-container {
            display: flex;
            gap: 6px;
        }

        .add-member-container input {
            flex-grow: 1;
            padding: 6px 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .btn-add-member {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add-member:hover {
            background: var(--accent-color);
            color: #000;
        }

        @media (max-width: 600px) {
            header {
                padding-top: 50px;
            }
            .btn-config {
                position: relative;
                margin-bottom: 20px;
                display: inline-block;
            }
        }
    </style>
</head>

                { id: "p23", name: "б•≤ssб•ЖбС≤—Цб•≤бГЂб•Жr вНіrб•±ћБ-mб•±sрЭЧНrб•±" },

            ]
        };

        let membrosData = {};

        // Escuta o banco Firebase
        const membrosRef = ref(db, 'membrosPatentesListas');
        onValue(membrosRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                membrosData = data;
            } else {
                // Inicializa se o banco estiver vazio com arrays vazios
                for (let cat in patentesData) {
                    patentesData[cat].forEach(p => { membrosData[p.id] = []; });
                }
                set(membrosRef, membrosData);
            }
            renderSite();
            
            if(document.getElementById('edit-panel').style.display === 'block') {
                renderEditFields();
            }
        });

        // Exibe os membros na tela inicial (junta os nomes com v√≠rgulas apenas visualmente)
        function renderSite() {
            const container = document.getElementById('patentes-container');
            container.innerHTML = '';

            for (let categoria in patentesData) {
                let card = document.createElement('div');
                card.className = 'category-card';
                
                let title = document.createElement('h2');
                title.className = 'category-title';
                title.innerText = categoria;
                card.appendChild(title);

                patentesData[categoria].forEach(patente => {
                    let item = document.createElement('div');
                    item.className = 'patent-item';
                    
                    let pName = document.createElement('span');
                    pName.className = 'patent-name';
                    pName.innerText = patente.name;
                    
                    let mList = document.createElement('div');
                    mList.className = 'members-list';
                    
                    const listaMembros = membrosData[patente.id] || [];
                    mList.innerText = listaMembros.length > 0 ? listaMembros.join(', ') : "Nenhum membro";

                    item.appendChild(pName);
                    item.appendChild(mList);
                    card.appendChild(item);
                });

                container.appendChild(card);
            }
        }

        // Gera a interface de listas no Painel do Administrador
        function renderEditFields() {
            const container = document.getElementById('edit-fields-container');
            container.innerHTML = '';

            for (let categoria in patentesData) {
                let catHeader = document.createElement('h4');
                catHeader.style.margin = "20px 0 10px 0";
                catHeader.style.color = "#fff";
                catHeader.innerText = categoria;
                container.appendChild(catHeader);

                patentesData[categoria].forEach(patente => {
                    let row = document.createElement('div');
                    row.className = 'edit-row';

                    let label = document.createElement('label');
                    label.innerText = patente.name;
                    row.appendChild(label);

                    // Criar a Lista Visual de Nomes Atuais
                    let ul = document.createElement('ul');
                    ul.className = 'member-list-edit';
                    
                    const listaMembros = membrosData[patente.id] || [];
                    
                    listaMembros.forEach((membro, index) => {
                        let li = document.createElement('li');
                        li.className = 'member-item-edit';
                        
                        let nameSpan = document.createElement('span');
                        nameSpan.innerText = membro;
                        
                        let deleteBtn = document.createElement('button');
                        deleteBtn.className = 'btn-delete-member';
                        deleteBtn.innerHTML = 'рЯЧСпЄП';
                        deleteBtn.onclick = function() {
                            // Remove o membro pelo index e atualiza o Firebase
                            let novaLista = [...listaMembros];
                            novaLista.splice(index, 1);
                            set(ref(db, `membrosPatentesListas/${patente.id}`), novaLista);
                        };

                        li.appendChild(nameSpan);
                        li.appendChild(deleteBtn);
                        ul.appendChild(li);
                    });
                    row.appendChild(ul);

                    // Criar Campo para Adicionar Novo Membro
                    let addContainer = document.createElement('div');
                    addContainer.className = 'add-member-container';

                    let input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = 'Nome do novo membro...';
                    input.id = `new-name-${patente.id}`;
                    
                    // Permite adicionar apertando a tecla Enter
                    input.onkeypress = function(e) {
                        if (e.key === 'Enter') {
                            adicionarNovoMembro(patente.id, input);
                        }
                    };

                    let addBtn = document.createElement('button');
                    addBtn.className = 'btn-add-member';
                    addBtn.innerText = 'пЉЛ';
                    addBtn.onclick = function() {
                        adicionarNovoMembro(patente.id, input);
                    };

                    addContainer.appendChild(input);
                    addContainer.appendChild(addBtn);
                    row.appendChild(addContainer);

                    container.appendChild(row);
                });
            }
        }

        // Fun√І√£o auxiliar para injetar novos nomes na lista do Firebase
        function adicionarNovoMembro(patenteId, inputElement) {
            const nome = inputElement.value.trim();
            if (nome === "") return;

            let listaAtual = membrosData[patenteId] || [];
            // Adiciona o novo nome √† lista
            listaAtual.push(nome);
            
            set(ref(db, `membrosPatentesListas/${patenteId}`), listaAtual).then(() => {
                inputElement.value = ""; // Limpa o campo de texto
            });
        }

        // Escopo global para os bot√µes do HTML tradicional
        window.openModal = function() {
            document.getElementById('config-modal').style.display = 'flex';
        }

        window.closeModal = function() {
            document.getElementById('config-modal').style.display = 'none';
            document.getElementById('email-input').value = '';
            document.getElementById('password-input').value = '';
        }

        window.handleLogin = function() {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;

            if (email === "lucaslcloux12@gmail.com" && pass === "01201201") {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('edit-panel').style.display = 'block';
                renderEditFields();
            } else {
                alert("Acesso negado! Credenciais incorretas.");
            }
        }

        window.handleLogout = function() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('edit-panel').style.display = 'none';
            document.getElementById('edit-fields-container').innerHTML = '';
            window.closeModal();
        }
    </script>
